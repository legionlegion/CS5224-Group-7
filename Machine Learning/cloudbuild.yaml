options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-west2"
  _AR_REPO: "recycling-images"
  _IMAGE_NAME: "ml-service"
  _DEPLOY_REGION: "us-west2"

steps:
  - name: "gcr.io/cloud-builders/docker"
    dir: "Machine Learning"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud deploy releases create "ml-${SHORT_SHA}" \
          --region="${_DEPLOY_REGION}" \
          --delivery-pipeline="ml-pipeline" \
          --skaffold-file="Deploy/ML/skaffold.yaml" \
          --source="." \
          --images="ml-image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"
