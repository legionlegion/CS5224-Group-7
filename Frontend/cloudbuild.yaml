options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: "us-west2"
  _AR_REPO: "recycling-images"
  _IMAGE_NAME: "frontend"
  _DEPLOY_REGION: "us-west2"
  _NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyAM95gmG6aIkX9YPlkks-0i7lx49wnjvH8"
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "cs5224-grp7-3bb27.firebaseapp.com"
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: "cs5224-grp7-3bb27"
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "cs5224-grp7-3bb27.firebasestorage.app"
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "306363185631"
  _NEXT_PUBLIC_FIREBASE_APP_ID: "1:306363185631:web:d9cdd06f7fdb535416ec6a"
  _NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: "G-W1M97SH63B"

steps:
  - name: "gcr.io/cloud-builders/docker"
    dir: "Frontend"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"
      - "--build-arg=NEXT_PUBLIC_API_BASE_URL=https://recycling-backend-dev-306363185631.us-west2.run.app"
      - "--build-arg=NEXT_PUBLIC_USE_MOCK_API=false"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}"
      - "--build-arg=NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID=${_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID}"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "bash"
    args:
      - "-c"
      - |
        gcloud deploy releases create "fe-${SHORT_SHA}" \
          --region="${_DEPLOY_REGION}" \
          --delivery-pipeline="frontend-pipeline" \
          --skaffold-file="Deploy/Frontend/skaffold.yaml" \
          --source="." \
          --images="frontend-image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/${_IMAGE_NAME}:${COMMIT_SHA}"
