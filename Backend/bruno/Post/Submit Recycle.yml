info:
  name: "Submit Recycle "
  type: http
  seq: 1

http:
  method: POST
  url: "{{base_url}}/api/verify-recycling"
  body:
    type: multipart-form
    data:
      - name: latitude
        type: text
        value: Text
        contentType: "37.4"
      - name: longitude
        type: text
        value: Text
        contentType: "30.2"
      - name: image
        type: text
        value: File
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Recycle Success
    request:
      url: /api/verify-recycling
      method: POST
      body:
        type: multipart-form
        data:
          - name: latitude
            type: text
            value: Text
            contentType: "37.4"
          - name: longitude
            type: text
            value: Text
            contentType: "30.2"
          - name: image
            type: text
            value: File
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
            "status": "success",
            "code": 1,
            "data": {
              "total_bins": 2,
              "bins": [
                {
                  "id": 1,
                  "latitude": 1.3142,
                  "longitude": 103.7652
                },
                {
                  "id": 2,
                  "latitude": 1.3145,
                  "longitude": 103.7655
                }
              ]
            }
          }
  - name: Recycle Fail
    request:
      url: /api/verify-recycling
      method: POST
      body:
        type: multipart-form
        data:
          - name: latitude
            type: text
            value: Text
            contentType: "37.4"
          - name: longitude
            type: text
            value: Text
            contentType: "30.2"
          - name: image
            type: text
            value: File
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: |-
          {
            "status": "fail",
            "code": 1,
            "data": {
              "total_bins": 0,
              "bins": []
            }
          }
