apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: recycling-backend-dev
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0" # Cold start to save costs when idle
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/startup-cpu-boost: "true" # Boosts CPU during startup to help cold starts
    spec:
      serviceAccountName: backend-run-dev@cs5224-grp7-3bb27.iam.gserviceaccount.com
      containerConcurrency: 60 # Moderate concurrency to balance load and resource usage
      timeoutSeconds: 300 # Increase timeout for longer processing times (cold starts)
      containers:
        - image: backend-image
          resources:
            limits:
              cpu: "1"
              memory: "512Mi"
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "cs5224-grp7-3bb27"
            - name: ML_PREDICT_URL
              value: "https://recycling-ml-dev-306363185631.asia-southeast1.run.app/predict"