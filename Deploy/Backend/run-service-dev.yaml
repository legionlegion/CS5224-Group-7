apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: recycling-backend-dev
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0" # Cold start to save costs when idle
        autoscaling.knative.dev/maxScale: "5"
        run.googleapis.com/startup-cpu-boost: "true" # Boosts CPU during startup to help cold starts
    spec:
      serviceAccountName: backend-run-dev@cs5224-grp7-3bb27.iam.gserviceaccount.com
      containerConcurrency: 40
      timeoutSeconds: 300 
      containers:
        - image: backend-image
          resources:
            limits:
              cpu: "1000m"
              memory: "512Mi"
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "cs5224-grp7-3bb27"
            - name: ML_PREDICT_URL
              value: "https://recycling-ml-dev-306363185631.asia-southeast1.run.app/predict"