apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: recycling-ml-dev
spec:
  template:
    spec:
      serviceAccountName: backend-run-dev@cs5224-grp7-3bb27.iam.gserviceaccount.com
      containers:
        - image: ml-image
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "cs5224-grp7-3bb27"
          resources:
            limits:
              memory: "2Gi"
              cpu: "1"